models:
  # ── UNIFIED model for ALL agents ──
  # Using single model to prevent RAM exhaustion from model swapping.
  # The 7B model handles all tasks: recon, enum, exploitation, AND orchestration.
  default:
    name: cyberagent-pentest:7b
    base_model: qwen2.5:7b-instruct-q4_K_M
    use_for: [recon, enumeration, vuln_scan, exploitation, post_exploit, reporting, orchestrator, privesc]
    temperature: 0.1
    num_ctx: 8192
    description: "Qwen2.5:7b with expert pentest system prompt — unified for all phases"
  
  # Reasoning now points to same model (prevents swapping)
  reasoning:
    name: cyberagent-pentest:7b
    base_model: qwen2.5:7b-instruct-q4_K_M
    use_for: [orchestrator, privesc, exploit_chaining, report_generation]
    temperature: 0.05
    num_ctx: 8192
    num_predict: 512
    description: "Same 7B model for reasoning tasks — prevents model swapping"
  
  embedding:
    name: nomic-embed-text
    use_for: [chromadb_rag]

  # ── Base models (fallback if tuned models fail) ──
  default_base:
    name: qwen2.5:7b-instruct-q4_K_M
    use_for: [fallback]
    temperature: 0.1
    num_ctx: 8192
  reasoning_base:
    name: qwen2.5:7b-instruct-q4_K_M
    use_for: [fallback]
    temperature: 0.05
    num_ctx: 8192

ollama_base_url: http://localhost:11434

# ChromaDB collections for RAG (15 total, 147,029 docs)
rag_collections:
  primary:
    - cve_database        # 71,653 NVD CVEs
    - exploitdb           # 46,437 Exploit-DB records
    - nuclei_templates    # 12,735 scanner templates
    - hacktricks          # 8,290 methodology chunks
    - seclists_meta       # 5,214 wordlist entries
  secondary:
    - payloads            # 1,332 payload sections
    - mitre_attack        # 691 ATT&CK techniques
    - gtfobins            # 458 binary abuse entries
    - owasp               # 122 WSTG test cases
    - privesc_techniques  # 61 Linux PrivEsc techniques
  extended:
    - owasp_top10         # 10 OWASP Top 10 2021
    - cwe_top25           # 10 CWE Top 25 2023
    - pentest_techniques  # 7 master technique references
    - ptes_standard       # 7 PTES methodology sections
    - anti_hallucination  # 2 anti-hallucination protocol docs
